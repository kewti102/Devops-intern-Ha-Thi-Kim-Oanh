name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test
        run: npm test

      - name: Generate short sha
  	run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/demo-app:sha-${{ env.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/demo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Scan image with Trivy
  	uses: aquasecurity/trivy-action@0.28.0
  	with:
   	 image-ref: ghcr.io/${{ github.repository_owner }}/demo-app:sha-${{ env.SHORT_SHA }}
   	 format: table
    	 exit-code: 1
    	 severity: HIGH,CRITICAL
    	 
    	 - name: Install Syft
      uses: anchore/sbom-action/download-syft@v0

    - name: Generate SBOM
      run: |
        syft ghcr.io/${{ github.repository_owner }}/demo-app:latest \
        -o spdx-json=sbom.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json
