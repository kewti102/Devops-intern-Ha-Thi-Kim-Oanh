apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-vpa
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app-vpa
  template:
    metadata:
      labels:
        app: demo-app-vpa
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-vpa
  namespace: demo
spec:
  selector:
    app: demo-app-vpa
  ports:
    - name: http
      port: 80
      targetPort: 80
