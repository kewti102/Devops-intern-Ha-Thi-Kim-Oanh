apiVersion: v1
kind: Pod
metadata:
  name: load-generator
  namespace: demo
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - "while true; do wget -q -O- http://demo-app-autoscale.demo.svc.cluster.local; done"
  restartPolicy: Never
