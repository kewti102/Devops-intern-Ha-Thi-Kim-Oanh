apiVersion: v1
kind: Pod
metadata:
  name: config-demo
  namespace: demo
  labels:
    app: config-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "while true; do sleep 3600; done"]
      env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: demo-config
              key: APP_ENV
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: demo-config
              key: APP_MESSAGE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: demo-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: demo-secret
              key: DB_PASSWORD
      volumeMounts:
        - name: config-volume
          mountPath: /etc/demo-config
          readOnly: true
        - name: secret-volume
          mountPath: /etc/demo-secret
          readOnly: true
  volumes:
    - name: config-volume
      configMap:
        name: demo-config
    - name: secret-volume
      secret:
        secretName: demo-secret
